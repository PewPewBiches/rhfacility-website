<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RH Facility</title>

  <style>
    :root {
      --red: #ff3131;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ---------- TOP LOGO ---------- */
    .logo-wrap {
      text-align: center;
      padding-top: 32px;
    }

    .logo {
      width: 180px;
      max-width: 80%;
    }

    /* ---------- HERO ---------- */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
    }

    .headline {
      font-size: clamp(48px, 6vw, 68px);
      line-height: 1.05;
      letter-spacing: -1px;
    }

    .headline .light {
      font-weight: 400;
    }

    .headline .bold-red {
      font-weight: 800;
      color: var(--red);
      font-style: italic;
    }

    /* ---------- FOOTER CONTACT ---------- */
    .footer {
      display: flex;
      justify-content: space-between;
      padding: 28px 40px;
      font-size: 16px;
    }

    .footer a {
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, opacity 0.18s ease;
      display: inline-block;
    }

    .footer a.phone {
      color: var(--red);
      font-weight: 500;
    }

    /* hover zoom */
    .footer a:hover {
      transform: scale(1.08);
      opacity: 0.85;
    }

    /* ---------- MOBILE ---------- */
    @media (max-width: 640px) {
      .footer {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }

      .logo {
        width: 140px;
      }
    }
  </style>
</head>

<body>
  <!-- LOGO -->
  <div class="logo-wrap">
    <!-- replace with your uploaded logo filename -->
    <img src="logo.png" alt="RH Facility" class="logo" />
  </div>

  <!-- HERO TEXT -->
  <section class="hero">
    <h1 class="headline">
      <span class="light">Supply, </span>
      <span class="bold-red">Simplified</span>
    </h1>
  </section>

  <!-- FOOTER CONTACT -->
  <footer class="footer">
    <a href="tel:+917042123124" class="phone">
      +91 7042-123-124
    </a>

    <a href="mailto:sc@rhfacility.com">
      sc@rhfacility.com
    </a>
  </footer>
</body>
</html>
